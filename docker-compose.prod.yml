# docker-compose.prod.yml — Production deployment via Coolify
#
# Coolify's Traefik handles HTTPS/SSL automatically.
# Set your domain in Coolify UI when deploying — no manual labels needed.

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - vrl_projects:/root/vrl-projects
    environment:
      - BACKEND_HOST=0.0.0.0
      - BACKEND_PORT=8000
      - BACKEND_RELOAD=false
      - VRL_PROJECTS_DIR=/root/vrl-projects
      - CORS_ORIGINS=
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 4
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: /api
        VITE_WS_URL: ""
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  vrl_projects:
