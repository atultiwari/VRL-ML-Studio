# docker-compose.prod.yml — Production deployment with Traefik
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Prerequisites:
#   - Traefik running as a reverse proxy with the "traefik-proxy" Docker network
#   - DNS A record for your subdomain pointing to the VPS IP
#   - Traefik configured with a "letsencrypt" certificate resolver
#
# The frontend is built into static files and served by an internal nginx.
# Nginx proxies /api/* and /ws to the backend. Traefik handles HTTPS and
# routes the domain to the frontend container.

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - vrl_projects:/root/vrl-projects
    environment:
      - BACKEND_HOST=0.0.0.0
      - BACKEND_PORT=8000
      - BACKEND_RELOAD=false
      - VRL_PROJECTS_DIR=/root/vrl-projects
      - CORS_ORIGINS=
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 4
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - internal

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: /api
        VITE_WS_URL: ""
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.vrl-ml-studio.rule=Host(`mlstudio.vedantresearchlabs.com`)
      - traefik.http.routers.vrl-ml-studio.entrypoints=websecure
      - traefik.http.routers.vrl-ml-studio.tls.certresolver=letsencrypt
      - traefik.http.services.vrl-ml-studio.loadbalancer.server.port=80
    networks:
      - traefik-proxy
      - internal

volumes:
  vrl_projects:

networks:
  traefik-proxy:
    external: true
  internal:
    internal: true
