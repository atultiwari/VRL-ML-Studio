# docker-compose.yml — Local development (hot reload on both services)
#
# Usage:
#   docker compose up --build
#
# Frontend: http://localhost:3000  (Vite dev server, hot reload)
# Backend:  http://localhost:8000  (Uvicorn, auto-reload)
#
# For VPS / production deployment, use docker-compose.prod.yml instead.

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /app/__pycache__
      - vrl_projects:/root/vrl-projects
    environment:
      - BACKEND_HOST=0.0.0.0
      - BACKEND_PORT=8000
      - BACKEND_RELOAD=true
      - VRL_PROJECTS_DIR=/root/vrl-projects
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_WS_URL=ws://localhost:8000
      - VITE_BACKEND_INTERNAL_URL=http://backend:8000
    command: npm run dev -- --host 0.0.0.0 --port 3000
    depends_on:
      backend:
        condition: service_healthy

volumes:
  vrl_projects:
